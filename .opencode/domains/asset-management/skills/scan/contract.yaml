slot: scan
name: 吏部
description: 代码扫描，生成 code-index.yaml

inputs:
  - name: module_name
    type: string
    required: true

outputs:
  - name: code_index
    path: "openspec/specs/{module_name}/code-index.yaml"

verify:
  - type: file_exists
    path: "openspec/specs/{module_name}/code-index.yaml"
    error_msg: "code-index.yaml 不存在，扫描失败"

depends_on: []
retry_max: 1
